name: Build and Release

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  build:
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Build binary and wheel
        run: ./scripts/build.sh --host-only
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartusbhub-linux-${{ matrix.arch }}
          path: |
            dist/smartusbhub-linux-*
            dist/smartusbhub_cli-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Deduplicate wheel/sdist artifacts
        run: |
          # Both arch jobs produce the same wheel/sdist; keep only one copy.
          find artifacts -name 'smartusbhub_cli-*.whl' -print0 | sort -z | tail -n +2 | xargs -0 rm -f
          find artifacts -name 'smartusbhub_cli-*.tar.gz' -print0 | sort -z | tail -n +2 | xargs -0 rm -f
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/smartusbhub-linux-*
            artifacts/**/smartusbhub_cli-*.whl
            artifacts/**/smartusbhub_cli-*.tar.gz
          generate_release_notes: true
